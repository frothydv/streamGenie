<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Stream Overlay</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        width: 300px;
        padding: 12px;
        margin: 0;
        background: #18181b;
        color: #efeff1;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 8px 0;
        color: #bf94ff;
      }
      .status {
        font-size: 12px;
        padding: 8px;
        background: #1f1f23;
        border-radius: 4px;
        margin-bottom: 8px;
      }
      .status.ok   { border-left: 3px solid #00f593; }
      .status.wait { border-left: 3px solid #f5b000; }
      .status.off  { border-left: 3px solid #666; }
      .hint {
        font-size: 11px;
        color: #adadb8;
        margin-top: 8px;
      }
      code {
        background: #0e0e10;
        padding: 1px 4px;
        border-radius: 2px;
        font-size: 11px;
      }
      .section-title {
        font-size: 11px;
        color: #adadb8;
        text-transform: uppercase;
        letter-spacing: .05em;
        margin: 12px 0 6px;
      }
      .trigger-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: #1f1f23;
        border-radius: 4px;
        padding: 6px 8px;
        margin-bottom: 4px;
        font-size: 12px;
      }
      .trigger-label {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: #efeff1;
      }
      .trigger-label small {
        color: #adadb8;
        margin-left: 4px;
        font-size: 10px;
      }
      .delete-btn {
        background: none;
        border: 1px solid #555;
        border-radius: 3px;
        color: #adadb8;
        font-size: 10px;
        cursor: pointer;
        padding: 2px 6px;
        margin-left: 8px;
        flex-shrink: 0;
      }
      .delete-btn:hover { border-color: #ff5c5c; color: #ff5c5c; }
      .empty-note {
        font-size: 11px;
        color: #555;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <h1>Stream Genie (dev)</h1>
    <div id="status" class="status wait">Checking current tab...</div>
    <div class="hint">
      Press <code>Alt+Shift+C</code> on a Twitch stream to create a trigger.
    </div>

    <div class="section-title">Saved Triggers</div>
    <div id="triggers-list"></div>

    <script src="popup.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Stream Genie</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        width: 300px;
        padding: 12px;
        margin: 0;
        background: #18181b;
        color: #efeff1;
        font-size: 13px;
      }
      h1 { font-size: 14px; margin: 0 0 10px; color: #bf94ff; }
      .status {
        font-size: 12px; padding: 8px; background: #1f1f23;
        border-radius: 4px; margin-bottom: 12px;
      }
      .status.ok   { border-left: 3px solid #00f593; }
      .status.wait { border-left: 3px solid #f5b000; }
      .status.off  { border-left: 3px solid #666; }
      .section-title {
        font-size: 10px; color: #adadb8; text-transform: uppercase;
        letter-spacing: .06em; margin: 12px 0 6px;
      }
      .field-label {
        display: block; font-size: 10px; color: #adadb8;
        text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px;
      }
      select {
        width: 100%; background: #0e0e10; border: 1px solid #555;
        border-radius: 4px; color: #efeff1; padding: 5px 8px;
        font-size: 12px; margin-bottom: 8px; box-sizing: border-box;
        cursor: pointer;
      }
      select:focus { outline: none; border-color: #9146ff; }
      .apply-btn {
        width: 100%; background: #9146ff; border: none; border-radius: 4px;
        color: #fff; font-size: 12px; font-weight: bold; cursor: pointer;
        padding: 7px; margin-bottom: 6px;
      }
      .apply-btn:hover { background: #772ce8; }
      .note { font-size: 10px; color: #adadb8; margin-bottom: 4px; }
      .divider { border: none; border-top: 1px solid #333; margin: 12px 0; }
      .trigger-row {
        display: flex; align-items: center; justify-content: space-between;
        background: #1f1f23; border-radius: 4px; padding: 6px 8px; margin-bottom: 4px;
      }
      .trigger-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .trigger-label small { color: #adadb8; margin-left: 4px; font-size: 10px; }
      .delete-btn {
        background: none; border: 1px solid #555; border-radius: 3px;
        color: #adadb8; font-size: 10px; cursor: pointer; padding: 2px 6px; margin-left: 8px;
      }
      .delete-btn:hover { border-color: #ff5c5c; color: #ff5c5c; }
      .edit-btn {
        background: none; border: 1px solid #555; border-radius: 3px;
        color: #9146ff; font-size: 10px; cursor: pointer; padding: 2px 6px; margin-left: 4px;
      }
      .edit-btn:hover { border-color: #9146ff; color: #9146ff; }
      .empty-note { font-size: 11px; color: #555; font-style: italic; }
      #triggers-list { max-height: 400px; overflow-y: auto; margin-right: -4px; padding-right: 4px; }
      #triggers-list::-webkit-scrollbar { width: 4px; }
      #triggers-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
      .hint { font-size: 10px; color: #adadb8; margin-top: 6px; }
      code { background: #0e0e10; padding: 1px 4px; border-radius: 2px; font-size: 10px; }
      .detected-note {
        font-size: 10px; color: #00f593; margin: -4px 0 8px;
        display: none;
      }
      .contribute-btn {
        width: 100%; background: none; border: 1px solid #9146ff; border-radius: 4px;
        color: #9146ff; font-size: 12px; font-weight: bold; cursor: pointer;
        padding: 7px; margin-top: 4px;
      }
      .contribute-btn:hover { background: rgba(145,70,255,0.15); }
      .no-profile-banner {
        background: rgba(245,166,35,0.1); border: 1px solid #f5a623; border-radius: 4px;
        padding: 8px 10px; margin: 4px 0 8px; display: none;
      }
      .no-profile-banner p { margin: 0 0 6px; font-size: 11px; color: #f5a623; }
      .create-profile-btn {
        width: 100%; background: none; border: 1px solid #f5a623; border-radius: 4px;
        color: #f5a623; font-size: 12px; font-weight: bold; cursor: pointer;
        padding: 6px;
      }
      .create-profile-btn:hover { background: rgba(245,166,35,0.15); }
      .create-profile-btn:disabled { opacity: 0.5; cursor: default; }
      .contributor-status { font-size: 11px; padding: 6px 0; }
      .contributor-status.trusted { color: #00f593; }
      .contributor-status.pr { color: #adadb8; }
      .contributor-status input {
        width: 100%; box-sizing: border-box; background: #0e0e10; border: 1px solid #555;
        border-radius: 4px; color: #efeff1; padding: 4px 8px; font-size: 11px; margin-top: 6px;
      }
      .contributor-status input:focus { outline: none; border-color: #9146ff; }
      .code-row { display: flex; gap: 6px; margin-top: 6px; }
      .code-row input { flex: 1; }
      .review-btn {
        width: 100%; background: none; border: 1px solid #f5b000; border-radius: 4px;
        color: #f5b000; font-size: 12px; font-weight: bold; cursor: pointer;
        padding: 7px; margin-top: 8px; display: none;
      }
      .review-btn:hover { background: rgba(245,176,0,0.15); }
      .accept-btn {
        flex: 1; background: #00f593; border: none; border-radius: 4px;
        color: #18181b; font-size: 11px; font-weight: bold; cursor: pointer; padding: 5px;
      }
      .accept-btn:hover { background: #00c97a; }
      .accept-btn:disabled { opacity: 0.5; cursor: default; }
      .reject-btn {
        flex: 1; background: none; border: 1px solid #ff5c5c; border-radius: 4px;
        color: #ff5c5c; font-size: 11px; font-weight: bold; cursor: pointer; padding: 5px;
      }
      .reject-btn:hover { background: rgba(255,92,92,0.12); }
      .reject-btn:disabled { opacity: 0.5; cursor: default; }
      .proposal-img-thumb {
        width: 32px; height: 32px; object-fit: contain; border-radius: 2px;
        background: #0e0e10; flex-shrink: 0;
      }
      .review-form input, .review-form textarea {
        width: 100%; box-sizing: border-box; background: #0e0e10; border: 1px solid #555;
        border-radius: 4px; color: #efeff1; padding: 4px 8px; font-size: 11px;
        margin-bottom: 6px;
      }
      .review-form input:focus, .review-form textarea:focus { outline: none; border-color: #9146ff; }
      .review-form textarea { resize: vertical; }
    </style>
  </head>
  <body>
    <h1>Stream Genie (pre-alpha)</h1>
    <div id="status" class="status wait">Checking…</div>

    <div class="section-title">Active Profile</div>
    <label class="field-label">Game</label>
    <select id="game-select"></select>
    <div id="detected-game" class="detected-note"></div>
    <div id="no-profile-banner" class="no-profile-banner">
      <p id="no-profile-text"></p>
      <button class="create-profile-btn" id="create-profile-btn"></button>
    </div>
    <label class="field-label">Profile</label>
    <select id="profile-select"></select>
    <div id="new-profile-form" style="display:none; margin-bottom:8px;">
      <input id="new-profile-name" type="text" placeholder="Profile name (e.g. competitive)"
        style="width:100%;box-sizing:border-box;background:#0e0e10;border:1px solid #9146ff;
               border-radius:4px;color:#efeff1;padding:5px 8px;font-size:12px;margin-bottom:4px;" />
      <div style="display:flex;gap:6px;">
        <button class="apply-btn" id="new-profile-submit" style="flex:1;margin:0;">Create</button>
        <button class="delete-btn" id="new-profile-cancel" style="padding:6px 10px;">Cancel</button>
      </div>
      <div id="new-profile-note" class="note"></div>
    </div>
    <a href="#" id="new-profile-link"
      style="display:block;font-size:10px;color:#9146ff;text-align:right;margin:-4px 0 8px;text-decoration:none;">
      + New profile
    </a>
    <button class="apply-btn" id="apply-btn">Apply</button>
    <div id="apply-note" class="note"></div>

    <div class="section-title">Contributor Status</div>
    <div id="contributor-trusted" class="contributor-status trusted" style="display:none;">
      ✓ Trusted contributor
      <span id="contributor-code-hint" style="font-size:10px;margin-left:6px;color:#adadb8;"></span>
      <a href="#" id="contributor-clear" style="font-size:10px;color:#adadb8;margin-left:8px;text-decoration:none;">Clear</a>
      <button class="review-btn" id="review-btn"></button>
    </div>
    <div id="contributor-pr" class="contributor-status pr" style="display:none;">
      Contributing via PR — have a code?
      <div class="code-row">
        <input id="contributor-code-input" type="text" placeholder="Paste contributor code…" />
        <button id="contributor-code-save" class="delete-btn" style="padding:4px 10px;white-space:nowrap;">Save</button>
      </div>
      <div id="contributor-code-note" class="note" style="margin-top:4px;"></div>
      <a href="https://github.com/frothydv/streamGenieProfiles/pulls" target="_blank"
        style="display:block;font-size:10px;color:#adadb8;margin-top:6px;text-decoration:none;">
        View pending PRs on GitHub ↗
      </a>
    </div>

    <hr class="divider" />

    <button class="contribute-btn" id="contribute-btn">+ Contribute a Trigger</button>

    <div id="triggers-section">
      <div class="section-title" style="display:flex; justify-content:space-between; align-items:center;">
        <span>Saved Triggers (<span id="profile-label">—</span>)</span>
        <a href="#" id="refresh-profile-btn" style="text-transform:none; color:#9146ff; text-decoration:none; font-size:11px;">↻ refresh</a>
      </div>
      <div id="triggers-list"></div>
    </div>

    <div id="proposals-panel" style="display:none;">
      <div class="section-title" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
        <span>Pending Review</span>
        <a href="#" id="proposals-back" style="text-transform:none; color:#adadb8; text-decoration:none; font-size:11px;">← Back</a>
      </div>
      <div id="proposals-list"></div>
    </div>

    <hr class="divider" />
    <div class="section-title">Overlay Settings</div>
    <div style="background:#1f1f23; border-radius:4px; padding:6px 8px; margin-bottom:12px; display:flex; align-items:flex-start;">
        <input type="checkbox" id="global-disable-ext" style="cursor:pointer; margin:2px 8px 0 0;" />
        <label for="global-disable-ext" style="cursor:pointer; font-size:11px; flex:1; color:#efeff1;">
            <strong>Auto-disable Twitch Extensions</strong>
            <div class="hint" style="margin-top:2px;">Disables pointer events on Twitch overlays (like Slay the Relics) globally so StreamGenie works everywhere.</div>
        </label>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
